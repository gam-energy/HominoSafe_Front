# TLS edge for SenioSentry — HTTPS on frontend (:3000) and API (:8888) only.
# Plain HTTP app containers bind only on localhost side-ports; this proxy owns public 3000/8888.
#
# Certs are issued by a private CA (certs/ca.crt). Browsers show "Not Secure" and
# block Web Push / service workers until that CA is installed as a trusted root.
# Download: https://<host>:3000/seniosentry-ca.crt

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      "";
}

upstream senio_front {
    server senio_front-web-1:3000;
    keepalive 32;
}

upstream senio_api {
    server homino_app:8888;
    keepalive 32;
}

# --- Frontend HTTPS (:3000) ---
server {
    listen 3000 ssl;
    http2 on;
    server_name 93.118.120.215;

    ssl_certificate     /etc/nginx/certs/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/seniosentry.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_buffer_size     4k;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss image/svg+xml;

    client_max_body_size 50m;

    location = /seniosentry-ca.crt {
        alias /etc/nginx/certs/ca.crt;
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="seniosentry-ca.crt"';
        add_header Cache-Control "no-store";
    }

    location = /trust-https.html {
        alias /etc/nginx/certs/trust-https.html;
        default_type text/html;
    }

    # Same-origin API paths (browser → :3000 → FastAPI)
    location ~ ^/(api|token|refresh|refresh-token|logout|register|user|admin|alert|health|medical|doctor|causal|synapse|device|support|appointments|me|orders|ehr|applications|notifications|reports|docs|openapi\.json|redoc|ws)(/|$) {
        proxy_pass http://senio_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 5s;
        # Long enough for websockets under /alert/ws and /synapse; frames return in ms.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Long-cache hashed Next static chunks
    location ^~ /_next/static/ {
        proxy_pass http://senio_front;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://senio_front;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# --- Backend HTTPS (:8888) ---
server {
    listen 8888 ssl;
    http2 on;
    server_name 93.118.120.215;

    ssl_certificate     /etc/nginx/certs/fullchain.crt;
    ssl_certificate_key /etc/nginx/certs/seniosentry.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_buffer_size     4k;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    client_max_body_size 50m;

    location = /seniosentry-ca.crt {
        alias /etc/nginx/certs/ca.crt;
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="seniosentry-ca.crt"';
        add_header Cache-Control "no-store";
    }

    location / {
        proxy_pass http://senio_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
