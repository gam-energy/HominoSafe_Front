# TLS edge for SenioSentry frontend + API (same host, HTTPS).
# Browser → :443 → Next (senio_front-web-1:3000) and FastAPI (homino_app:8888)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream senio_front {
    server senio_front-web-1:3000;
}

upstream senio_api {
    server homino_app:8888;
}

server {
    listen 443 ssl;
    server_name 93.118.120.215;

    ssl_certificate     /etc/nginx/certs/seniosentry.crt;
    ssl_certificate_key /etc/nginx/certs/seniosentry.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 50m;

    # Backend API / websockets (top-level FastAPI mounts + /api/*).
    # Do NOT include `auth` — Next.js owns /auth/sign-in|sign-up|... 
    # Device auth lives at /device/* (authenticate_router), not /auth/*.
    location ~ ^/(api|token|refresh|refresh-token|logout|register|user|admin|alert|health|medical|doctor|causal|synapse|device|support|appointments|me|orders|ehr|applications|notifications|reports|docs|openapi\.json|redoc|ws)(/|$) {
        proxy_pass http://senio_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Next.js frontend
    location / {
        proxy_pass http://senio_front;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
