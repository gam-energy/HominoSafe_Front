# HTTPS edge for SenioSentry frontend (:3000) + API (:8888).
# Start with:
#   docker compose -f docker-compose.https.yml up -d
#
# Plain app containers must NOT bind public 3000/8888 (they use localhost side-ports).

services:
  tls-proxy:
    image: nginx:1.27-alpine
    container_name: senio_tls_proxy
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "8888:8888"
    volumes:
      - ./deploy/nginx-https.conf:/etc/nginx/conf.d/default.conf:ro
      - ../certs:/etc/nginx/certs:ro
    networks:
      - front
      - backend

networks:
  front:
    name: senio_front_default
    external: true
  backend:
    name: homino_safe_homino_network
    external: true
