# OPTIONAL — not used in the default deploy.
# UI stays on http://<host>:3000; API on http://<host>:8888.
# Only start this if you explicitly want an HTTPS edge on :443:
#   docker compose -f docker-compose.https.yml up -d
services:
  tls-proxy:
    image: nginx:1.27-alpine
    container_name: senio_tls_proxy
    profiles: ["https"]
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./deploy/nginx-https.conf:/etc/nginx/conf.d/default.conf:ro
      - ../certs:/etc/nginx/certs:ro
    networks:
      - front
      - backend

networks:
  front:
    name: senio_front_default
    external: true
  backend:
    name: homino_safe_homino_network
    external: true
