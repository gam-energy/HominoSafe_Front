services:
  tls-proxy:
    image: nginx:1.27-alpine
    container_name: senio_tls_proxy
    restart: unless-stopped
    ports:
      # Host :80 is already taken on the deploy server; HTTPS-only is enough
      # for Secure Context / notifications.
      - "443:443"
    volumes:
      - ./deploy/nginx-https.conf:/etc/nginx/conf.d/default.conf:ro
      - ../certs:/etc/nginx/certs:ro
    networks:
      - front
      - backend

networks:
  front:
    name: senio_front_default
    external: true
  backend:
    name: homino_safe_homino_network
    external: true
