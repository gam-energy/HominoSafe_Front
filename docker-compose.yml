services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Baked fallback only; browser uses same-origin (:3000) via Next rewrites
        NEXT_PUBLIC_API_URL: ""
        API_PROXY_TARGET: http://homino_app:8888
    ports:
      # HTTP only on loopback — public :3000 is HTTPS via senio_tls_proxy
      - "127.0.0.1:13000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ""
      API_PROXY_TARGET: http://homino_app:8888
    networks:
      - default
      - backend
    restart: unless-stopped

networks:
  backend:
    name: homino_safe_homino_network
    external: true
